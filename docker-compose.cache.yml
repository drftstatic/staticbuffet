# Docker Compose for adding Nginx caching layer to Static Buffet
# This sits in front of your Express server and dramatically improves video loading

version: '3.8'

services:
  nginx-cache:
    image: nginx:alpine
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
      - nginx-cache:/tmp/nginx-cache
    depends_on:
      - static-buffet
    restart: unless-stopped
    
  static-buffet:
    build: .
    ports:
      - "5000:5000"  # Only accessible via nginx
    environment:
      - NODE_ENV=production
      - PORT=5000
    restart: unless-stopped

volumes:
  nginx-cache:
    driver: local