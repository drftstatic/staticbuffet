# Nginx caching proxy for Static Buffet video optimization
# This sits in front of your Express server and caches Archive.org video responses

events {
    worker_connections 1024;
}

http {
    # Cache directory and settings
    proxy_cache_path /tmp/nginx-cache levels=1:2 keys_zone=video_cache:100m max_size=10g inactive=48h use_temp_path=off;
    
    # Rate limiting
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=video:10m rate=5r/s;
    
    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
    
    # Main server block
    server {
        listen 80;
        server_name localhost;
        
        # Security headers
        add_header X-Frame-Options DENY;
        add_header X-Content-Type-Options nosniff;
        add_header X-XSS-Protection "1; mode=block";
        
        # Static files with aggressive caching
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            proxy_pass http://localhost:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Cache static assets for 1 year
            proxy_cache video_cache;
            proxy_cache_valid 200 365d;
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            add_header X-Cache-Status $upstream_cache_status;
            
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
        
        # Video proxy endpoints - the key optimization
        location /api/video/ {
            limit_req zone=video burst=10 nodelay;
            
            proxy_pass http://localhost:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Range $http_range;
            
            # Cache video responses aggressively
            proxy_cache video_cache;
            proxy_cache_valid 200 206 48h;  # Cache successful video responses for 48 hours
            proxy_cache_valid 404 1m;       # Cache 404s briefly
            proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
            proxy_cache_revalidate on;
            
            # Handle range requests properly
            proxy_cache_methods GET HEAD;
            proxy_cache_key "$scheme$request_method$host$request_uri$http_range";
            
            # Large buffer for video streaming
            proxy_buffering on;
            proxy_buffer_size 128k;
            proxy_buffers 4 256k;
            proxy_busy_buffers_size 256k;
            
            # Timeouts optimized for video
            proxy_connect_timeout 30s;
            proxy_send_timeout 60s;
            proxy_read_timeout 60s;
            
            # Add cache status header for debugging
            add_header X-Cache-Status $upstream_cache_status;
            add_header X-Cache-Key "$scheme$request_method$host$request_uri$http_range";
        }
        
        # Cached video endpoints
        location /api/cached-video/ {
            limit_req zone=video burst=10 nodelay;
            
            proxy_pass http://localhost:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header Range $http_range;
            
            # These are already cached by your app, so minimal nginx caching
            proxy_cache video_cache;
            proxy_cache_valid 200 206 1h;
            add_header X-Cache-Status $upstream_cache_status;
        }
        
        # API endpoints with lighter caching
        location /api/ {
            limit_req zone=api burst=20 nodelay;
            
            proxy_pass http://localhost:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Cache API responses briefly
            proxy_cache video_cache;
            proxy_cache_valid 200 5m;      # Cache successful API calls for 5 minutes
            proxy_cache_valid 404 1m;      # Cache 404s briefly
            proxy_cache_use_stale error timeout updating;
            
            add_header X-Cache-Status $upstream_cache_status;
        }
        
        # All other requests to your Express app
        location / {
            proxy_pass http://localhost:5000;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            
            # Don't cache dynamic content
            proxy_no_cache 1;
            proxy_cache_bypass 1;
        }
        
        # Cache status endpoint for monitoring
        location /nginx-status {
            access_log off;
            return 200 "Nginx cache status: OK\n";
            add_header Content-Type text/plain;
        }
        
        # Purge cache endpoint (for debugging)
        location /purge-cache {
            allow 127.0.0.1;
            deny all;
            access_log off;
            
            proxy_cache_purge video_cache "$scheme$request_method$host$request_uri";
        }
    }
}