  <rect x="0" y="0" width="57" height="187" fill="#C0C0C0"/>
  <rect x="57" y="0" width="57" height="187" fill="#C0C000"/>
  <rect x="114" y="0" width="57" height="187" fill="#00C0C0"/>
  <rect x="171" y="0" width="57" height="187" fill="#00C000"/>
  <rect x="228" y="0" width="57" height="187" fill="#C000C0"/>
  <rect x="285" y="0" width="57" height="187" fill="#C00000"/>
  <rect x="342" y="0" width="58" height="187" fill="#0000C0"/>
  
  <!-- Mid section with ramp -->
  <rect x="0" y="187" width="57" height="26" fill="#0000C0"/>
  <rect x="57" y="187" width="57" height="26" fill="#000000"/>
  <rect x="114" y="187" width="57" height="26" fill="#C000C0"/>
